name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'setlu-frontend/**'

jobs:
  deploy:
    name: Build and deploy to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: setlu-frontend/package-lock.json

      - name: Install dependencies
        working-directory: setlu-frontend
        run: npm ci

      - name: Build
        working-directory: setlu-frontend
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: setlu-frontend/dist
